<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Cosmic Deep Field — Constellation Art</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #000005;
    touch-action: none;
    font-family: 'Space Mono', monospace;
    cursor: crosshair;
  }
  canvas { display: block; position: fixed; inset: 0; width: 100vw; height: 100vh; }

  /* HUD overlay */
  .hud {
    position: fixed;
    left: 0; top: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* Top left — title */
  .hud-title {
    position: absolute;
    top: 22px; left: 24px;
  }
  .hud-title .main {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 0.18em;
    color: rgba(200, 220, 255, 0.92);
    text-shadow: 0 0 30px rgba(100, 160, 255, 0.6), 0 0 60px rgba(100, 160, 255, 0.2);
    display: block;
    line-height: 1;
  }
  .hud-title .sub {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.32em;
    color: rgba(120, 160, 220, 0.55);
    text-transform: uppercase;
    display: block;
    margin-top: 5px;
  }

  /* Top right — coordinates */
  .hud-coords {
    position: absolute;
    top: 22px; right: 24px;
    text-align: right;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: rgba(100, 140, 200, 0.45);
    line-height: 1.8;
  }

  /* Bottom — mode instructions */
  .hud-modes {
    position: absolute;
    bottom: 28px; left: 24px;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .mode-item {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .mode-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(160, 200, 255, 0.5);
    box-shadow: 0 0 6px rgba(160, 200, 255, 0.4);
    flex-shrink: 0;
  }
  .mode-text {
    font-size: 9px;
    letter-spacing: 0.15em;
    color: rgba(140, 175, 230, 0.5);
  }

  /* Bottom right — decorative reticle */
  .hud-reticle {
    position: absolute;
    bottom: 24px; right: 24px;
    width: 38px; height: 38px;
  }
  .hud-reticle svg {
    width: 100%; height: 100%;
    opacity: 0.35;
    animation: reticle-spin 12s linear infinite;
  }
  @keyframes reticle-spin {
    to { transform: rotate(360deg); }
  }

  /* Vignette */
  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(
      ellipse at 50% 50%,
      transparent 30%,
      rgba(0, 0, 8, 0.55) 70%,
      rgba(0, 0, 5, 0.88) 100%
    );
    pointer-events: none;
    z-index: 5;
  }

  /* Scanline grain overlay */
  .grain {
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    background-repeat: repeat;
    background-size: 180px 180px;
    opacity: 0.022;
    pointer-events: none;
    z-index: 6;
  }

  /* Mode flash */
  .mode-flash {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 7;
    opacity: 0;
    transition: opacity 0.08s ease;
  }
  .mode-flash.active {
    opacity: 1;
    transition: opacity 0s;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="vignette"></div>
<div class="grain"></div>
<div class="mode-flash" id="modeFlash"></div>

<div class="hud">
  <div class="hud-title">
    <span class="main">DEEP FIELD</span>
    <span class="sub">Constellation Interface</span>
  </div>

  <div class="hud-coords">
    RA 03h 32m 39s<br>
    DEC +00° 10′ 15″<br>
    z = 0.000
  </div>

  <div class="hud-modes">
    <div class="mode-item">
      <div class="mode-dot" style="background:rgba(255,160,80,0.7);box-shadow:0 0 6px rgba(255,140,60,0.5)"></div>
      <span class="mode-text">1F — GRAVITATIONAL PULL</span>
    </div>
    <div class="mode-item">
      <div class="mode-dot" style="background:rgba(160,200,255,0.7);box-shadow:0 0 6px rgba(160,200,255,0.5)"></div>
      <span class="mode-text">2F — BINARY ORBIT</span>
    </div>
    <div class="mode-item">
      <div class="mode-dot" style="background:rgba(200,140,255,0.7);box-shadow:0 0 6px rgba(180,120,255,0.5)"></div>
      <span class="mode-text">3F — GALACTIC VORTEX</span>
    </div>
    <div class="mode-item">
      <div class="mode-dot" style="background:rgba(100,255,200,0.7);box-shadow:0 0 6px rgba(80,255,180,0.5)"></div>
      <span class="mode-text">4F — SUPERNOVA BURST</span>
    </div>
  </div>

  <div class="hud-reticle">
    <svg viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="19" cy="19" r="16" stroke="rgba(160,200,255,0.8)" stroke-width="0.5" stroke-dasharray="4 3"/>
      <line x1="19" y1="3" x2="19" y2="9" stroke="rgba(160,200,255,0.9)" stroke-width="0.8"/>
      <line x1="19" y1="29" x2="19" y2="35" stroke="rgba(160,200,255,0.9)" stroke-width="0.8"/>
      <line x1="3" y1="19" x2="9" y2="19" stroke="rgba(160,200,255,0.9)" stroke-width="0.8"/>
      <line x1="29" y1="19" x2="35" y2="19" stroke="rgba(160,200,255,0.9)" stroke-width="0.8"/>
      <circle cx="19" cy="19" r="2" stroke="rgba(200,220,255,0.7)" stroke-width="0.6"/>
    </svg>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d', { alpha: false });
  const flash = document.getElementById('modeFlash');
  let W, H, DPR;
  const pointers = new Map();
  const stars = [];
  const galaxies = [];
  const meteors = [];
  let time = 0;
  let last = performance.now();
  let modePulse = 0;

  // Star color palettes — inspired by JWST/Hubble deep field images
  const STAR_COLORS = [
    { r:255, g:255, b:255 },   // pure white
    { r:200, g:220, b:255 },   // cool blue-white
    { r:255, g:230, b:180 },   // warm yellow (like Hubble stars)
    { r:255, g:180, b:100 },   // orange giant
    { r:160, g:200, b:255 },   // blue giant
    { r:255, g:100, b:80  },   // red giant
  ];

  // Nebula/galaxy palette from photos
  const NEBULA_COLS = [
    [255, 120, 60, 0.06],   // Milky Way core warm orange
    [180, 100, 255, 0.05],  // purple nebula
    [60,  120, 255, 0.07],  // JWST blue arc
    [255, 200, 80,  0.04],  // warm glow
    [80,  200, 255, 0.05],  // cyan cloud
  ];

  function resize() {
    DPR = Math.min(devicePixelRatio || 1, 2);
    W = innerWidth; H = innerHeight;
    canvas.width  = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    initStars();
    initGalaxies();
  }

  function rand(a, b) { return a + Math.random() * (b - a); }
  function clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }

  function initStars() {
    stars.length = 0;
    const count = Math.floor(clamp((W * H) / 4800, 140, 280));
    for (let i = 0; i < count; i++) {
      const col = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
      // Some stars are JWST-style (larger, with diffraction spikes)
      const isJWST = Math.random() < 0.06;
      stars.push({
        x: rand(0, W), y: rand(0, H),
        vx: rand(-.2, .2), vy: rand(-.2, .2),
        ox: rand(0, W), oy: rand(0, H),
        r: isJWST ? rand(1.6, 3.2) : rand(0.6, 2.0),
        glow: rand(.3, 1),
        phase: rand(0, Math.PI * 2),
        mass: rand(.7, 1.7),
        col: col,
        isJWST: isJWST,
        spikeAngle: rand(0, Math.PI / 6),
        brightness: rand(0.6, 1.0),
      });
    }
  }

  // Background galaxy smudges (Hubble deep field tiny galaxies)
  function initGalaxies() {
    galaxies.length = 0;
    const count = Math.floor(clamp((W * H) / 18000, 40, 120));
    for (let i = 0; i < count; i++) {
      const col = NEBULA_COLS[Math.floor(Math.random() * NEBULA_COLS.length)];
      galaxies.push({
        x: rand(0, W), y: rand(0, H),
        rx: rand(4, 22), ry: rand(2, 8),
        angle: rand(0, Math.PI),
        col: col,
        type: Math.floor(rand(0, 3)), // 0=elliptical, 1=spiral smudge, 2=lensed arc
      });
    }
  }

  // Pointer handling
  canvas.addEventListener('pointerdown', e => {
    canvas.setPointerCapture(e.pointerId);
    pointers.set(e.pointerId, { x: e.clientX, y: e.clientY, px: e.clientX, py: e.clientY });
    modePulse = 1;
    triggerModeFlash(pointers.size);
  });
  canvas.addEventListener('pointermove', e => {
    const p = pointers.get(e.pointerId);
    if (!p) return;
    p.px = p.x; p.py = p.y;
    p.x = e.clientX; p.y = e.clientY;
    const speed = Math.hypot(p.x - p.px, p.y - p.py);
    if (speed > 14) {
      meteors.push({
        x: p.x, y: p.y,
        vx: (p.x - p.px) * .4, vy: (p.y - p.py) * .4,
        life: 1,
        col: getModeMeteorColor(pointers.size),
      });
    }
  });
  function endPointer(e) { pointers.delete(e.pointerId); modePulse = 1; }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);

  function getModeMeteorColor(n) {
    if (n === 1) return [255, 150, 80];
    if (n === 2) return [160, 210, 255];
    if (n === 3) return [190, 120, 255];
    return [80, 255, 200];
  }

  function triggerModeFlash(n) {
    const colors = {
      1: 'rgba(255,100,40,0.04)',
      2: 'rgba(80,150,255,0.04)',
      3: 'rgba(150,60,255,0.05)',
    };
    flash.style.background = colors[n] || 'rgba(40,255,160,0.04)';
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 80);
  }

  function centerOfTouches() {
    const arr = [...pointers.values()];
    if (!arr.length) return { x: W / 2, y: H / 2 };
    return { x: arr.reduce((s, p) => s + p.x, 0) / arr.length, y: arr.reduce((s, p) => s + p.y, 0) / arr.length };
  }

  // Physics modes
  function applyNoTouch(s, dt) {
    s.vx += (s.ox - s.x) * .0006 * dt;
    s.vy += (s.oy - s.y) * .0006 * dt;
    s.vx += Math.cos(time * .4 + s.phase) * .0025 * dt;
    s.vy += Math.sin(time * .33 + s.phase) * .0025 * dt;
  }

  function applyOneTouch(s, p, dt) {
    // Warm gravitational pull — like Milky Way core glowing orange
    const dx = p.x - s.x, dy = p.y - s.y;
    const d = Math.hypot(dx, dy) + 1;
    const pull = clamp(280 / d, .1, 4.0);
    const orbit = 1.3;
    s.vx += (dx / d) * pull * .032 * dt + (-dy / d) * orbit * .016 * dt;
    s.vy += (dy / d) * pull * .032 * dt + ( dx / d) * orbit * .016 * dt;
  }

  function applyTwoTouches(s, arr, dt) {
    // Binary star orbit — cool blue JWST style
    const a = arr[0], b = arr[1];
    const cx = (a.x + b.x) / 2, cy = (a.y + b.y) / 2;
    const dist = Math.hypot(b.x - a.x, b.y - a.y) || 100;
    const angle = Math.atan2(b.y - a.y, b.x - a.x);
    const ring = dist * .42 + 50 + (s.phase % 1) * 30;
    const theta = angle + time * (0.65 + s.mass * .12) + s.phase;
    const tx = cx + Math.cos(theta) * ring;
    const ty = cy + Math.sin(theta) * ring * .6;
    s.vx += (tx - s.x) * .0022 * dt;
    s.vy += (ty - s.y) * .0022 * dt;
  }

  function applyThreeTouches(s, arr, dt) {
    // Galaxy spiral — purple nebula style
    const c = centerOfTouches();
    const dx = s.x - c.x, dy = s.y - c.y;
    const d = Math.hypot(dx, dy) + 1;
    const arm = Math.sin(d * .022 - time * 2.0 + s.phase) * 38;
    const theta = Math.atan2(dy, dx) + .026 * dt;
    const targetR = clamp(d * .988 + arm * .04, 30, Math.max(W, H) * .52);
    const tx = c.x + Math.cos(theta + arm * .012) * targetR;
    const ty = c.y + Math.sin(theta + arm * .012) * targetR;
    s.vx += (tx - s.x) * .002 * dt;
    s.vy += (ty - s.y) * .002 * dt;
    s.vx += (-dy / d) * .042 * dt;
    s.vy += ( dx / d) * .042 * dt;
  }

  function applyFourTouches(s, arr, dt, i) {
    // Supernova / deep field burst
    const c = centerOfTouches();
    const pts = 8;
    const k = i % pts;
    const base = -Math.PI / 2 + k * Math.PI * 2 / pts;
    const radius = 60 + (i % 22) * 8 + Math.sin(time * 1.3 + i) * 22;
    const tx = c.x + Math.cos(base + time * .16) * radius + Math.cos(i * 8.7) * 26;
    const ty = c.y + Math.sin(base + time * .16) * radius + Math.sin(i * 6.9) * 26;
    s.vx += (tx - s.x) * .003 * dt;
    s.vy += (ty - s.y) * .003 * dt;
  }

  function update(dt) {
    time += dt / 1000;
    modePulse *= .93;
    const arr = [...pointers.values()];
    const n = arr.length;
    for (let i = 0; i < stars.length; i++) {
      const s = stars[i];
      if (n === 0) applyNoTouch(s, dt);
      else if (n === 1) applyOneTouch(s, arr[0], dt);
      else if (n === 2) applyTwoTouches(s, arr, dt);
      else if (n === 3) applyThreeTouches(s, arr, dt);
      else applyFourTouches(s, arr, dt, i);

      s.vx *= Math.pow(.984, dt);
      s.vy *= Math.pow(.984, dt);
      const maxV = 7;
      const v = Math.hypot(s.vx, s.vy);
      if (v > maxV) { s.vx = s.vx / v * maxV; s.vy = s.vy / v * maxV; }
      s.x += s.vx * dt * .055;
      s.y += s.vy * dt * .055;
      if (s.x < -40) s.x = W + 40; if (s.x > W + 40) s.x = -40;
      if (s.y < -40) s.y = H + 40; if (s.y > H + 40) s.y = -40;
    }

    for (let i = meteors.length - 1; i >= 0; i--) {
      const m = meteors[i];
      m.x += m.vx * dt * .05; m.y += m.vy * dt * .05;
      m.life -= dt * .0016;
      if (m.life <= 0) meteors.splice(i, 1);
    }
  }

  // ─── Drawing ─────────────────────────────────────────────────────────

  function drawBackground() {
    // Multi-layer deep space — inspired by Milky Way photo gradient
    const n = pointers.size;

    // Base deep black
    ctx.fillStyle = '#000005';
    ctx.fillRect(0, 0, W, H);

    // Milky Way band nebula glow — shifts color by mode
    const nebulaColors = {
      0: ['rgba(20,10,40,0.9)', 'rgba(10,5,25,0.7)', 'rgba(5,2,12,0)'],
      1: ['rgba(60,25,10,0.55)', 'rgba(30,12,5,0.3)', 'rgba(5,2,0,0)'],   // warm orange (1 touch)
      2: ['rgba(8,18,55,0.55)', 'rgba(4,10,30,0.3)', 'rgba(0,2,8,0)'],    // deep blue (2 touch)
      3: ['rgba(30,8,60,0.55)', 'rgba(15,4,35,0.3)', 'rgba(5,0,12,0)'],   // purple (3 touch)
      4: ['rgba(5,40,30,0.5)', 'rgba(2,20,15,0.25)', 'rgba(0,5,3,0)'],    // teal (4 touch)
    };
    const nc = nebulaColors[Math.min(n, 4)];

    // Diagonal milky way band
    const bx = W * 0.5 + Math.sin(time * 0.04) * W * 0.04;
    const by = H * 0.5 + Math.cos(time * 0.03) * H * 0.03;
    const g1 = ctx.createRadialGradient(bx, by, 0, bx, by, Math.max(W, H) * 0.75);
    g1.addColorStop(0, nc[0]);
    g1.addColorStop(0.5, nc[1]);
    g1.addColorStop(1, nc[2]);
    ctx.fillStyle = g1;
    ctx.fillRect(0, 0, W, H);

    // Horizon glow (like photo 1 — orange/amber at bottom)
    if (n === 0 || n === 1) {
      const hg = ctx.createLinearGradient(0, H * 0.7, 0, H);
      hg.addColorStop(0, 'rgba(0,0,0,0)');
      hg.addColorStop(0.6, 'rgba(40,15,5,0.18)');
      hg.addColorStop(1, 'rgba(80,25,5,0.35)');
      ctx.fillStyle = hg;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function drawGalaxies() {
    // Tiny background galaxy smudges — Hubble deep field style
    for (const g of galaxies) {
      ctx.save();
      ctx.translate(g.x, g.y);
      ctx.rotate(g.angle);
      const [r, gv, b, a] = g.col;

      if (g.type === 2) {
        // Gravitational lensed arc (JWST style)
        ctx.beginPath();
        ctx.arc(0, 0, g.rx, -0.6, 0.6);
        ctx.strokeStyle = `rgba(${r},${gv},${b},${a * 1.4})`;
        ctx.lineWidth = g.ry * 0.5;
        ctx.stroke();
      } else {
        // Elliptical / spiral smudge
        const gg = ctx.createRadialGradient(0, 0, 0, 0, 0, g.rx);
        gg.addColorStop(0, `rgba(${r},${gv},${b},${a * 2.5})`);
        gg.addColorStop(1, `rgba(${r},${gv},${b},0)`);
        ctx.fillStyle = gg;
        ctx.scale(1, g.ry / g.rx);
        ctx.beginPath();
        ctx.arc(0, 0, g.rx, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }

  function drawConnections() {
    const n = pointers.size;
    // Connection color by mode
    const lineColors = {
      0: [180, 200, 255],
      1: [255, 160, 80],
      2: [120, 180, 255],
      3: [180, 100, 255],
      4: [80, 255, 180],
    };
    const lc = lineColors[Math.min(n, 4)];
    const maxDist = 85 + modePulse * 30;

    ctx.lineWidth = 0.7;
    for (let i = 0; i < stars.length; i++) {
      const a = stars[i];
      for (let j = i + 1; j < Math.min(stars.length, i + 32); j++) {
        const b = stars[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const d2 = dx * dx + dy * dy;
        if (d2 < maxDist * maxDist) {
          const alpha = (1 - Math.sqrt(d2) / maxDist) * 0.22 * (a.brightness + b.brightness) * 0.5;
          ctx.strokeStyle = `rgba(${lc[0]},${lc[1]},${lc[2]},${alpha})`;
          ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        }
      }
    }
  }

  function drawDiffractionSpikes(x, y, r, col, alpha) {
    // JWST 6-spike diffraction pattern
    const spikeLen = r * 9;
    const angles = [0, Math.PI / 3, Math.PI * 2 / 3];
    ctx.lineWidth = r * 0.35;
    for (const ang of angles) {
      const grad = ctx.createLinearGradient(
        x + Math.cos(ang) * spikeLen, y + Math.sin(ang) * spikeLen,
        x - Math.cos(ang) * spikeLen, y - Math.sin(ang) * spikeLen
      );
      grad.addColorStop(0, `rgba(${col.r},${col.g},${col.b},0)`);
      grad.addColorStop(0.45, `rgba(${col.r},${col.g},${col.b},${alpha * 0.7})`);
      grad.addColorStop(0.5, `rgba(${col.r},${col.g},${col.b},${alpha})`);
      grad.addColorStop(0.55, `rgba(${col.r},${col.g},${col.b},${alpha * 0.7})`);
      grad.addColorStop(1, `rgba(${col.r},${col.g},${col.b},0)`);
      ctx.strokeStyle = grad;
      ctx.beginPath();
      ctx.moveTo(x + Math.cos(ang) * spikeLen, y + Math.sin(ang) * spikeLen);
      ctx.lineTo(x - Math.cos(ang) * spikeLen, y - Math.sin(ang) * spikeLen);
      ctx.stroke();
    }
  }

  function drawStars() {
    for (const s of stars) {
      const flicker = .7 + Math.sin(time * 2.8 + s.phase) * .2 + s.glow * .2;
      const r = s.r * flicker * s.brightness;
      const { r: cr, g: cg, b: cb } = s.col;

      if (s.isJWST) {
        // JWST bright star with diffraction spikes
        const spikeAlpha = 0.45 + Math.sin(time * 1.5 + s.phase) * 0.1;
        drawDiffractionSpikes(s.x, s.y, r, s.col, spikeAlpha);
      }

      // Outer glow halo
      const glowR = r * (s.isJWST ? 10 : 6);
      const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, glowR);
      grad.addColorStop(0, `rgba(${cr},${cg},${cb},0.9)`);
      grad.addColorStop(0.15, `rgba(${cr},${cg},${cb},0.4)`);
      grad.addColorStop(0.5, `rgba(${cr},${cg},${cb},0.1)`);
      grad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(s.x, s.y, glowR, 0, Math.PI * 2); ctx.fill();

      // Star core
      ctx.fillStyle = `rgba(${Math.min(255, cr + 30)},${Math.min(255, cg + 30)},${Math.min(255, cb + 30)},0.97)`;
      ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2); ctx.fill();
    }
  }

  function drawTouchAuras() {
    const arr = [...pointers.values()];
    const n = arr.length;
    const auraColors = {
      1: [[255, 140, 60], [255, 80, 20]],
      2: [[100, 180, 255], [60, 120, 255]],
      3: [[200, 80, 255], [140, 40, 255]],
      4: [[60, 255, 180], [20, 200, 140]],
    };
    const ac = auraColors[Math.min(n, 4)] || auraColors[4];

    for (const p of arr) {
      // Outer ring pulse
      const pulse = 1 + modePulse * 0.4 + Math.sin(time * 3.5) * 0.07;
      const outerR = 90 * pulse;

      const g1 = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, outerR);
      g1.addColorStop(0, `rgba(${ac[0][0]},${ac[0][1]},${ac[0][2]},0.18)`);
      g1.addColorStop(0.4, `rgba(${ac[1][0]},${ac[1][1]},${ac[1][2]},0.07)`);
      g1.addColorStop(1, `rgba(${ac[0][0]},${ac[0][1]},${ac[0][2]},0)`);
      ctx.fillStyle = g1;
      ctx.beginPath(); ctx.arc(p.x, p.y, outerR, 0, Math.PI * 2); ctx.fill();

      // Reticle ring
      ctx.strokeStyle = `rgba(${ac[0][0]},${ac[0][1]},${ac[0][2]},${0.3 + modePulse * 0.2})`;
      ctx.lineWidth = 0.8;
      ctx.setLineDash([5, 4]);
      ctx.beginPath(); ctx.arc(p.x, p.y, 28 + modePulse * 15, 0, Math.PI * 2); ctx.stroke();
      ctx.setLineDash([]);

      // Center dot
      ctx.fillStyle = `rgba(${ac[0][0]},${ac[0][1]},${ac[0][2]},0.65)`;
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2); ctx.fill();
    }
  }

  function drawMeteors() {
    for (const m of meteors) {
      const [cr, cg, cb] = m.col;
      ctx.lineWidth = 1.5 * m.life;
      const trail = 5;
      const grad = ctx.createLinearGradient(
        m.x, m.y,
        m.x - m.vx * trail, m.y - m.vy * trail
      );
      grad.addColorStop(0, `rgba(${cr},${cg},${cb},${m.life * 0.8})`);
      grad.addColorStop(1, `rgba(${cr},${cg},${cb},0)`);
      ctx.strokeStyle = grad;
      ctx.beginPath();
      ctx.moveTo(m.x, m.y);
      ctx.lineTo(m.x - m.vx * trail, m.y - m.vy * trail);
      ctx.stroke();
    }
  }

  function frame(now) {
    const dt = Math.min(32, now - last); last = now;
    update(dt);
    drawBackground();
    drawGalaxies();
    drawConnections();
    drawTouchAuras();
    drawMeteors();
    drawStars();
    requestAnimationFrame(frame);
  }

  addEventListener('resize', resize);
  resize();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
